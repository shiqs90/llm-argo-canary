# Argo Rollout replacing a plain Deployment: rolls the served model from
# Llama-3.2-1B (stable) to Llama-3.2-3B (canary) with an automated health gate.
#
# Traffic split is replica-weighted (no service mesh): one Service selects BOTH
# stable and canary pods, so at setWeight 50 (1 stable + 1 canary) requests
# load-balance ~50/50. Both versions serve the same API name "llama-chat"
# (--served-model-name), so clients never change.
#
# MODEL and GPU_UTIL travel together: the 16 GB T4 has no memory isolation under
# time-slicing, so each version declares its own vLLM memory cap. With replicas: 1 the
# steady state is a SINGLE pod, so a canary adds just one temporary pod (surge). The
# biggest moment is 1B + 3B side by side:
#   1B -> 0.25 (~4 GB)   3B -> 0.55 (~8.8 GB)   => ~12.8 GB, fits 16 GB with headroom.
# Promoted state is a single 3B (~8.8 GB). --enforce-eager (no CUDA graphs) is kept as a
# small KV-cache safety margin on the Turing T4.
apiVersion: argoproj.io/v1alpha1
kind: Rollout
metadata:
  name: llama-canary
spec:
  replicas: 1
  selector:
    matchLabels:
      app: llama-canary
  strategy:
    canary:
      # replicas: 1, so a canary ADDS one temporary pod beside the live one:
      # maxSurge 1 (allow +1 pod for the canary) + maxUnavailable 0 (never drop the live
      # pod). setWeight 50 => live 1B + canary 3B = 2 pods; after promote => a single 3B.
      maxSurge: 1
      maxUnavailable: 0
      steps:
        - setWeight: 50            # live 1B + canary 3B, ~50/50
        - analysis:                # automated gate — failure auto-aborts to stable
            templates:
              - templateName: vllm-health
        - pause: {}                # human gate — `kubectl argo rollouts promote llama-canary`
  template:
    metadata:
      labels:
        app: llama-canary
    spec:
      # A Service named like the app injects VLLM_PORT=tcp://... into pods and
      # crashes vLLM's own port parsing — disable service-link env injection.
      enableServiceLinks: false
      nodeSelector:
        workload: gpu
      tolerations:
        - key: nvidia.com/gpu
          operator: Exists
          effect: NoSchedule
      containers:
        - name: vllm
          image: vllm/vllm-openai:v0.22.1
          env:
            - name: MODEL # patched by scripts/canary-demo.sh to trigger the canary
              value: meta-llama/Llama-3.2-1B-Instruct
            - name: GPU_UTIL # patched together with MODEL (see header comment)
              value: "0.25"
            - name: HF_TOKEN # Llama 3.2 is gated; secret created at runtime, never committed
              valueFrom:
                secretKeyRef:
                  name: hf-token
                  key: token
          args:
            - --model=$(MODEL)
            - --served-model-name=llama-chat
            - --gpu-memory-utilization=$(GPU_UTIL)
            - --dtype=half # T4 is Turing: no bfloat16 support, Llama 3.2 defaults to bf16
            - --enforce-eager # no CUDA graphs -> a small KV-cache safety margin on the Turing T4
            - --max-model-len=2048
            - --max-num-seqs=4 # modest concurrency; a single 3B has ample KV room
            - --port=8000
          ports:
            - containerPort: 8000
          resources:
            limits:
              nvidia.com/gpu: 1 # one of the 4 time slices
            requests:
              cpu: "1"
              memory: 6Gi
          startupProbe: # image pull + gated model download can take ~10 min
            httpGet:
              path: /health
              port: 8000
            failureThreshold: 60
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: llama-canary
spec:
  selector:
    app: llama-canary # matches stable AND canary pods — this IS the traffic split
  ports:
    - port: 8000
      targetPort: 8000
